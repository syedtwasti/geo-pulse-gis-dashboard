<!DOCTYPE html>
<html>
<head>
    <title>GeoPulse GIS Dashboard</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

    <style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;

        background: linear-gradient(135deg, #1a0f2e, #2b1055, #4b1e8a);
        overflow: hidden;
    }

    #map {
        height: 100vh;
        filter: brightness(0.85) saturate(1.1);
    }

    .dashboard {
        position: absolute;
        top: 20px;
        left: 20px;
        width: 320px;
        padding: 20px;
        border-radius: 20px;

        background: rgba(140, 82, 255, 0.12); /* purple tint */
        backdrop-filter: blur(25px);
        -webkit-backdrop-filter: blur(25px);

        border: 1px solid rgba(180, 140, 255, 0.25);

        box-shadow: 
            0 8px 40px rgba(120, 0, 255, 0.35),
            inset 0 0 15px rgba(255,255,255,0.05);

        color: #f5f3ff;
        z-index: 1000;
    }

    .dashboard h2 {
        margin: 0 0 15px;
        font-weight: 600;
        letter-spacing: 0.5px;
    }

    input {
        width: 100%;
        padding: 10px;
        margin-bottom: 10px;

        border-radius: 10px;
        border: none;

        background: rgba(255,255,255,0.08);
        color: white;

        outline: none;
        backdrop-filter: blur(10px);
    }

    input::placeholder {
        color: rgba(255,255,255,0.6);
    }

    button {
        width: 100%;
        padding: 10px;
        margin-bottom: 10px;

        border-radius: 10px;
        border: none;

        background: rgba(160, 100, 255, 0.25);
        color: white;

        cursor: pointer;
        transition: all 0.3s ease;

        backdrop-filter: blur(10px);
    }

    button:hover {
        background: rgba(180, 120, 255, 0.45);
        transform: translateY(-2px);
        box-shadow: 0 0 12px rgba(160, 100, 255, 0.6);
    }

    .dashboard div {
        margin-top: 10px;
        font-size: 14px;
        opacity: 0.9;
    }

    canvas {
        margin-top: 15px;
        background: rgba(255,255,255,0.04);
        border-radius: 10px;
        padding: 5px;
    }

    hr {
        border: 1px solid rgba(255,255,255,0.1);
        margin: 10px 0;
    }

</style>
</head>

<body>

<div id="map"></div>

<div class="dashboard">
    <h2>🌏 GeoPulse</h2>

    <input type="text" id="searchBox" placeholder="Search city...">
    <button onclick="searchLocation()">Search</button>
    <button onclick="toggleRainHeatmap()">Toggle Rain Heatmap</button>

    <div>
        <b>Total Quakes:</b> <span id="total">0</span><br>
        <b>Avg Magnitude:</b> <span id="avg">0</span>
    </div>

    <canvas id="chart" height="150"></canvas>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

/* ================= MAP ================= */
const map = L.map('map').setView([30, 100], 4);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

/* ================= ASIA FILTER ================= */
const asia = { minLat:-10, maxLat:80, minLon:25, maxLon:180 };

/* ================= GLOBAL STATE ================= */
let quakeData = [];
let chart;
let rainLayer;
let rainVisible = false;

/* ================= EARTHQUAKE SYSTEM ================= */
function loadEarthquakes(){

    fetch('https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_day.geojson')
    .then(res => res.json())
    .then(data => {

        quakeData = [];

        map.eachLayer(layer => {
            if(layer instanceof L.CircleMarker) map.removeLayer(layer);
        });

        data.features.forEach(f => {

            let [lon, lat] = f.geometry.coordinates;

            if(lat < asia.minLat || lat > asia.maxLat || lon < asia.minLon || lon > asia.maxLon) return;

            let mag = f.properties.mag || 0;
            let place = f.properties.place;
            let time = new Date(f.properties.time).toLocaleString();

            quakeData.push(mag);

            L.circleMarker([lat, lon], {
                radius: mag * 2,
                fillOpacity: 0.6
            })
            .addTo(map)
            .bindPopup(`
                <b>${place}</b><br>
                Magnitude: ${mag}<br>
                Time: ${time}
            `);
        });

        updateAnalytics();
    });
}

/* ================= ANALYTICS ================= */
function updateAnalytics(){

    let total = quakeData.length;
    let avg = (quakeData.reduce((a,b)=>a+b,0) / total).toFixed(2);

    document.getElementById("total").innerText = total;
    document.getElementById("avg").innerText = avg;

    let bins = [0,0,0,0];

    quakeData.forEach(m => {
        if(m < 2) bins[0]++;
        else if(m < 4) bins[1]++;
        else if(m < 6) bins[2]++;
        else bins[3]++;
    });

    if(chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"), {
        type: 'bar',
        data: {
            labels: ["0-2","2-4","4-6","6+"],
            datasets: [{
                label: "Magnitude Distribution",
                data: bins
            }]
        }
    });
}

/* ================= REAL-TIME ================= */
setInterval(loadEarthquakes, 15000);
loadEarthquakes();

/* ================= WEATHER ================= */
map.on('click', function(e){

    let lat = e.latlng.lat;
    let lon = e.latlng.lng;

    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,precipitation_probability`)
    .then(res => res.json())
    .then(data => {

        let c = data.current;

        L.popup()
        .setLatLng([lat, lon])
        .setContent(`
            <b>🌦 Weather</b><br>
            🌡 Temp: ${c.temperature_2m}°C<br>
            💧 Humidity: ${c.relative_humidity_2m}%<br>
            🌧 Rain Chance: ${c.precipitation_probability}%
        `)
        .openOn(map);
    });
});

/* ================= SEARCH + AREA ================= */
function searchLocation(){

    let q = document.getElementById("searchBox").value;

    fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}`)
    .then(res => res.json())
    .then(data => {

        if(!data.length) return alert("Not found");

        let lat = parseFloat(data[0].lat);
        let lon = parseFloat(data[0].lon);
        let bb = data[0].boundingbox;

        let area = Math.abs((bb[1]-bb[0])*(bb[3]-bb[2])*111*111);

        map.setView([lat, lon], 8);

        L.marker([lat, lon])
        .addTo(map)
        .bindPopup(`
            <b>📍 ${q}</b><br>
            Approx Area: ${area.toFixed(2)} km²
        `)
        .openPopup();
    });
}

/* ================= RAIN HEATMAP ================= */
function generateRainHeatmap(){

    let points = [];

    for(let lat = 0; lat <= 50; lat += 10){
        for(let lon = 60; lon <= 140; lon += 10){

            fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=precipitation`)
            .then(res => res.json())
            .then(data => {

                let rain = data.current.precipitation || 0;

                points.push([lat, lon, rain]);

                if(points.length > 20){

                    if(rainLayer) map.removeLayer(rainLayer);

                    rainLayer = L.heatLayer(points, {
                        radius: 25,
                        blur: 15,
                        maxZoom: 6
                    });

                    if(rainVisible){
                        rainLayer.addTo(map);
                    }
                }
            });
        }
    }
}

function toggleRainHeatmap(){

    rainVisible = !rainVisible;

    if(rainVisible){
        generateRainHeatmap();
    } else {
        if(rainLayer) map.removeLayer(rainLayer);
    }
}

</script>

</body>
</html>
